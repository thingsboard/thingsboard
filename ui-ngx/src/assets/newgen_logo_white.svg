
<svg width="2000" height="600" viewBox="0 0 2000 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="lux" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="50%" stop-color="#E6F0FF"/>
      <stop offset="100%" stop-color="#AFCBFF"/>
    </linearGradient>

    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- icon -->
  <g transform="translate(80,120)" filter="url(#glow)">
    <polygon points="200,0 360,90 360,270 200,360 40,270 40,90"
             stroke="url(#lux)" stroke-width="16" fill="none"/>
             
    <circle cx="200" cy="180" r="60"
            stroke="url(#lux)" stroke-width="14" fill="none"/>

    <line x1="360" y1="180" x2="480" y2="180" stroke="url(#lux)" stroke-width="14"/>
    <line x1="0" y1="180" x2="40" y2="180" stroke="url(#lux)" stroke-width="14"/>
    <line x1="200" y1="360" x2="200" y2="470" stroke="url(#lux)" stroke-width="14"/>
    <line x1="200" y1="0" x2="200" y2="-70" stroke="url(#lux)" stroke-width="14"/>

    <circle cx="480" cy="180" r="10" fill="white"/>
    <circle cx="0" cy="180" r="10" fill="white"/>
    <circle cx="200" cy="470" r="10" fill="white"/>
    <circle cx="200" cy="-70" r="10" fill="white"/>
  </g>

  <!-- title -->
  <g transform="translate(700,260)">
    <text x="0" y="0"
      font-family="Orbitron, Eurostile, Arial, sans-serif"
      font-size="200"
      font-weight="800"
      letter-spacing="14"
      fill="url(#lux)">NEWGEN</text>

    <!-- luxury underline -->
    <line x1="10" y1="50" x2="1050" y2="50"
      stroke="url(#lux)" stroke-width="10"/>

    <text x="20" y="130"
      font-family="Orbitron, Arial, sans-serif"
      font-size="48"
      letter-spacing="16"
      fill="#FFFFFF"
      opacity="0.85">ADVANCED TECHNOLOGY</text>
  </g>

</svg>
