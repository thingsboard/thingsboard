    <circle cx="50" cy="50" r="50" fill="#000" opacity="0.06"/>
    <path d="M66.6654 49.9993L63.7279 52.9368L52.082 41.3118V66.666H47.9154V41.3118L36.2904 52.9577L33.332 49.9993L49.9987 33.3327L66.6654 49.9993Z" fill="#000"/>
