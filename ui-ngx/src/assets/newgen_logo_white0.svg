<svg width="1200" height="320" viewBox="0 0 1200 320" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="1"/>
      <stop offset="100%" stop-color="#D9D9D9" stop-opacity="1"/>
    </linearGradient>
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Transparent background -->

  <!-- Symbol -->
  <g transform="translate(40,40)" filter="url(#softGlow)">
    <path d="M40 120L110 40H190L120 120L190 200H110L40 120Z" fill="none" stroke="url(#accent)" stroke-width="16" stroke-linejoin="round"/>
    <path d="M86 120H230" stroke="url(#accent)" stroke-width="16" stroke-linecap="round"/>
  </g>

  <!-- Title -->
  <g transform="translate(290,75)">
    <text x="0" y="120"
      font-family="Arial, Helvetica, sans-serif"
      font-size="128"
      font-weight="700"
      letter-spacing="6"
      fill="#FFFFFF">NEWGEN</text>
    <rect x="4" y="145" width="520" height="10" rx="5" fill="#FFFFFF" opacity="0.9"/>
    <text x="6" y="205"
      font-family="Arial, Helvetica, sans-serif"
      font-size="32"
      font-weight="500"
      letter-spacing="8"
      fill="#FFFFFF" opacity="0.82">NEXT GENERATION</text>
  </g>
</svg>
