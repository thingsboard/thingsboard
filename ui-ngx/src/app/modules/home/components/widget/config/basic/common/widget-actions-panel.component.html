<div class="tb-form-panel" (click)="manageWidgetActions()" style="cursor: pointer;">
  <div class="flex flex-row items-center justify-start gap-4">
    <div class="tb-form-panel-title" translate style="padding-right: 48px;">widget-config.actions</div>
    <mat-chip-listbox class="flex-1">
      @for (actionSourceId of widgetActionSourceIds; track actionSourceId) {
        @for (widgetAction of widgetActionsByActionSourceId(actionSourceId); track widgetAction) {
          <mat-chip>
            <tb-icon matChipAvatar>{{ widgetAction.icon }}</tb-icon>
            {{ widgetAction.name }}
          </mat-chip>
        }
      }
    </mat-chip-listbox>
    @if (!hasWidgetActions) {
      <button mat-stroked-button color="primary">
        {{ 'widget-config.add-action' | translate }}
      </button>
    }
    @if (hasWidgetActions) {
      <button mat-icon-button color="primary">
        <mat-icon>add</mat-icon>
      </button>
    }
  </div>
</div>
